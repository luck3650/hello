<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>菜单链接</title>
    <style>
        /* ----- 基础重置与变量 ----- */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #10b981;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;

            --font-sans: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            --space-1: 0.25rem;
            --space-2: 0.5rem;
            --space-3: 0.75rem;
            --space-4: 1rem;
            --space-6: 1.5rem;
            --space-8: 2rem;
            --space-12: 3rem;
            --space-16: 4rem;
            --radius: 0.375rem;
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        body {
            font-family: var(--font-sans);
            color: var(--gray-800);
            line-height: 1.5;
            background-color: white;
            animation: pageFadeIn 0.5s ease-out;
        }

        @keyframes pageFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 排版 */
        h1, h2, h3, h4, h5, h6 {
            font-weight: 600;
            line-height: 1.2;
            margin-bottom: var(--space-4);
        }
        h1 { font-size: 2.5rem; }
        h2 { font-size: 2rem; }
        h3 { font-size: 1.5rem; }
        h4 { font-size: 1.25rem; }
        p { margin-bottom: var(--space-4); }
        a { color: var(--primary); text-decoration: none; }
        a:hover { text-decoration: underline; }

        .container {
            width: 100%;
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 var(--space-4);
        }

        /* 动画辅助类 - 用于滚动触发 */
        .animate-on-scroll {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1s ease, transform 1s ease;
        }
        .animate-on-scroll.animated {
            opacity: 1;
            transform: translateY(0);
        }

        /* 导航栏 */
        .navbar {
            background-color: white;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 4rem;
        }
        .nav-logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }
        .nav-menu {
            display: flex;
            list-style: none;
            gap: var(--space-6);
        }
        .nav-menu a {
            color: var(--gray-700);
            font-weight: 500;
            position: relative;
        }
        .nav-menu a:hover,
        .nav-menu a.active {
            color: var(--primary);
        }
        .nav-menu a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background-color: var(--primary);
            transition: width 0.3s ease;
        }
        .nav-menu a:hover::after,
        .nav-menu a.active::after {
            width: 100%;
        }
        .nav-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--gray-700);
        }

        /* 英雄区 */
        .hero {
            padding: var(--space-16) 0;
            background: linear-gradient(to right, var(--gray-50), white);
            text-align: center;
        }
        .hero h1 {
            font-size: 3rem;
            max-width: 800px;
            margin: 0 auto var(--space-4);
        }
        .hero p {
            font-size: 1.25rem;
            color: var(--gray-600);
            max-width: 600px;
            margin: 0 auto;
        }

        /* 提示框 */
        .alert {
            padding: var(--space-4);
            border-radius: var(--radius);
            margin-bottom: var(--space-4);
        }
        .alert-info {
            background-color: #dbeafe;
            color: #1e3a8a;
        }
        .alert-success {
            background-color: #d1fae5;
            color: #065f46;
        }
        .alert-warning {
            background-color: #fef3c7;
            color: #92400e;
        }
        .alert-danger {
            background-color: #bdb76b;
            color: #991b1b;
        }

        /* 页脚 */
        .footer {
            background-color: var(--gray-800);
            color: var(--gray-300);
            padding: var(--space-12) 0 var(--space-6);
            margin-top: var(--space-16);
            width: 95%;
			margin: 0 auto;
        }
        .footer a {
            color: var(--gray-300);
        }
        .footer a:hover {
            color: white;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            h2 { font-size: 1.75rem; }
            .nav-menu {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 4rem;
                left: 0;
                right: 0;
                background: white;
                padding: var(--space-4);
                box-shadow: var(--shadow-md);
                gap: var(--space-4);
            }
            .nav-menu.active {
                display: flex;
            }
            .nav-toggle {
                display: block;
            }
            .hero h1 {
                font-size: 2.5rem;
            }
        }

        /* 工具类 */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
        }
    </style>
</head>

<body>
    <!-- 导航栏 -->
    <header class="navbar">
        <div class="container nav-container">
            <a href="./index.html" class="nav-logo">回到首页</a>
            <button class="nav-toggle" aria-label="切换菜单" aria-expanded="false">☰</button>
            <ul class="nav-menu" id="nav-menu">
                <li><a href="#content1">工具</a></li>
                <li><a href="#content2">文章</a></li>
                <li><a href="#content3">游戏</a></li>
                <li><a href="#content4">其它</a></li>
            </ul>
        </div>
    </header>

    <main>
        <!-- 英雄区-->
        <section class="hero" id="heroSection">
		<h1 id="heroTitle">目录页面</h1>
        </section>

        <div id="contents" class="container">
            <h3 id="content1">工具类</h3>
            <div class="alert alert-info animate-on-scroll" data-delay="0">
				<a href="./mapbox" target="_blank" rel="noopener">maopbox0.54 地图 </a><br><br>
				
			</div> <br>  
		
		
			<h3 id="content2">文章记录</h3>
			<div  class="alert alert-success animate-on-scroll" data-delay="300"> 
				<a href="./luxun" target="_blank" rel="noopener">鲁迅宇宙</a><br>  
			</div> <br>  
		
			<h3 id="content3">游戏类</h3>
			<div class="alert alert-warning animate-on-scroll" data-delay="600">
			</div><br>  
		
			<h3 id="content4">其它</h3>
			<div  class="alert alert-danger animate-on-scroll" data-delay="600">
			</div><br>  
            
        </div>

    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="text-center" style="border-top: 1px solid var(--gray-700); padding-top: var(--space-6); text-align: center;">
                <p>&copy; 很多人想改变世界, 却很少有人想改变自己</p>
            </div>
        </div>
    </footer>

    <script>
        (function() {
            // 响应式菜单
            const toggleBtn = document.querySelector('.nav-toggle');
            const navMenu = document.getElementById('nav-menu');
            if (toggleBtn && navMenu) {
                toggleBtn.addEventListener('click', function() {
                    const expanded = this.getAttribute('aria-expanded') === 'true' ? false : true;
                    navMenu.classList.toggle('active');
                    this.setAttribute('aria-expanded', expanded);
                });
                // 点击链接后关闭菜单（移动端）
                navMenu.querySelectorAll('a').forEach(link => {
                    link.addEventListener('click', function() {
                        if (window.innerWidth <= 768) {
                            navMenu.classList.remove('active');
                            toggleBtn.setAttribute('aria-expanded', 'false');
                        }
                    });
                });
            }

            // 滚动动画：使用Intersection Observer添加类，通过CSS transition实现缓慢出现
            if ('IntersectionObserver' in window) {
                const animatedElements = document.querySelectorAll('.animate-on-scroll');
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            const el = entry.target;
                            const delay = el.getAttribute('data-delay') || '0';
                            // 设置transition-delay，实现延迟出现
                            el.style.transitionDelay = delay + 'ms';
                            el.classList.add('animated');
                            observer.unobserve(el);
                        }
                    });
                }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

                animatedElements.forEach(el => observer.observe(el));
            } else {
                // 降级：直接显示所有元素
                document.querySelectorAll('.animate-on-scroll').forEach(el => {
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                });
            }

            // 简单导航高亮（基于锚点）
            const links = document.querySelectorAll('.nav-menu a');
            const setActive = () => {
                const hash = window.location.hash || '#';
                links.forEach(link => {
                    const href = link.getAttribute('href');
                    link.classList.toggle('active', href === hash || (hash === '#' && href === '#'));
                });
            };
            window.addEventListener('hashchange', setActive);
            setActive();
        })();
    </script>
</body>
</html>
